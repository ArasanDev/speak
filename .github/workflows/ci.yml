name: CI

# Trigger on every push and every PR. Cancel in-flight runs for the same
# branch/PR so a rapid push sequence doesn't queue a pile of runners.
on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Always-reliable gate: a pure-shell source audit of the benchmark.md §3 BEAT
  # rows (no egress / account / third-party dep / paywall / pasteboard-read /
  # print). Needs no Xcode and no Apple SDK, so it runs on free Linux runners and
  # gives a trustworthy green check independent of Apple-runner availability.
  moat-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Structural moat audit (no Xcode needed)
        run: make verify-moat

  # Full build/test/lint. speak targets macOS 26 (Tahoe) + Xcode 26 and imports
  # FoundationModels + SpeechAnalyzer, which only exist on the macOS 26 SDK.
  # GitHub's `macos-26` image ships Xcode 26; `macos-latest`/older images fail
  # with `no such module 'FoundationModels'`, so this job MUST pin macos-26.
  build-test-lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install build tooling
        run: brew install xcodegen swiftlint

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint
