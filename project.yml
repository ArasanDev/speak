# project.yml — XcodeGen project definition for `speak`.
#
# XcodeGen is BUILD-TIME tooling only (never linked into the shipped app), so it
# does not touch the "Apple-frameworks-only at runtime" moat (AGENTS.md §2.4).
# The generated Speak.xcodeproj is the canonical build system mandated by
# architecture.md §5: app target + SpeakCore.framework + SpeakTests.
#
# Regenerate with `xcodegen generate` (wired into `make build`). The .swift
# sources live in their final §5 folders and are assigned to targets here.

name: Speak

options:
  bundleIdPrefix: com.speak
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

# Code signing is defined in Signing.xcconfig (applied to every config below via
# `configFiles`), so BOTH `make build` and Xcode Cmd+R produce an identically-signed
# app. Default is ad-hoc; `make dev-cert` switches it to a stable self-signed identity
# so TCC permission grants persist across rebuilds. Do NOT re-add CODE_SIGN_* here —
# target-level settings override the xcconfig and would silently reinstate ad-hoc.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"            # Swift 5 language mode (compiler is 6.3.2)
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:

  SpeakCore:
    type: framework
    platform: macOS
    sources:
      - SpeakCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speak.SpeakCore
        GENERATE_INFOPLIST_FILE: "YES"
        # Signing inherited from Signing.xcconfig (see configFiles above).

  Speak:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - target: SpeakCore
        embed: true
    info:
      path: App/Info.generated.plist
      properties:
        LSUIElement: true            # menubar-only, no Dock icon
        CFBundleDisplayName: speak
        CFBundleName: speak
        NSMicrophoneUsageDescription: "speak transcribes your voice into text on-device. Audio is never uploaded or stored — it never leaves your Mac."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speak.app
        # Signing inherited from Signing.xcconfig (see configFiles above).

  SpeakTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SpeakTests
    dependencies:
      - target: SpeakCore
      - target: Speak          # H2: TEST_HOST — gives tests access to the App shell
        embed: false           # test bundle embeds nothing; the host app carries it
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        # H2: host the Speak app so App-shell types (TranscriptOverlayPanel, AppDelegate…)
        # become unit-testable via @testable import Speak.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Speak.app/Contents/MacOS/Speak"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # CLI tool target — produces the `speak` binary that drives the running menubar app
  # via CFMessagePort IPC (Wave 2.3).
  #
  # Links SpeakCore for the shared CLIContract constants and codec types.
  # Does NOT embed the framework (it's a command-line tool, not a bundle);
  # the rpath points to DerivedData at build time.
  #
  # Install path (P11): the Homebrew cask symlinks this binary into PATH.
  # Standalone rpath (relative to @executable_path/../Frameworks or
  # /usr/local/lib/speak/) is set up in the P11 release target. [decision: W2.3]
  SpeakCLI:
    type: tool
    platform: macOS
    sources:
      - CLI
    dependencies:
      - target: SpeakCore
        embed: false
    settings:
      base:
        PRODUCT_NAME: speak
        PRODUCT_BUNDLE_IDENTIFIER: com.speak.cli
        GENERATE_INFOPLIST_FILE: "YES"
        # Use a distinct Swift module name to avoid the speak.swiftmodule artifact
        # colliding with Speak.swiftmodule (the app target) on the case-insensitive
        # APFS filesystem — both land in DerivedData/Build/Products/Debug/ and the
        # Swift module scanner would treat them as the same path. [decision: W2.3]
        SWIFT_MODULE_NAME: SpeakCLI
        # Signing inherited from Signing.xcconfig (see configFiles above).

schemes:
  Speak:
    build:
      targets:
        Speak: all
        SpeakCLI: all      # build the CLI tool on every `make build`
        SpeakTests: [test]
    test:
      targets:
        - SpeakTests
    run:
      config: Debug
