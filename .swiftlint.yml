# SwiftLint configuration for `speak`.
# Enforces the AGENTS.md §3 conventions (no force-unwrap/try!/as!, no print).

included:
  - App
  - SpeakCore
  - SpeakTests

excluded:
  - build
  - Speak.xcodeproj

# Opt-in rules that match the project's hard conventions.
opt_in_rules:
  - force_unwrapping          # AGENTS.md §3: no force-unwraps in production
  - empty_count
  - closure_spacing
  - explicit_init
  - redundant_nil_coalescing

# force_cast / force_try are on by default (error); keep them.
analyzer_rules: []

line_length:
  warning: 120
  error: 200
  ignores_comments: true

identifier_name:
  min_length: 2          # allow short names like `id`, `os`
  excluded:
    - id

# Force-unwrap is allowed in test code (XCTest fixtures), per AGENTS.md §3.
force_unwrapping:
  severity: error
